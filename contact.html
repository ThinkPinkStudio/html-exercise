<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/html-exercise/style.css">
    <title>Contact us</title>
</head>
<body>
    <main>
        <h1>Contact Us</h1>
        
        <section class="contact">
            <p>You can reach us via email or phone:</p>
            <ul>
                <li>Email: <a href="mailto:abdulrahmanlyman7@gmail.com">abdulrahmanlyman7@gmail.com</a></li>
                <li>Phone: <a href="tel:+265993885984">+265 993 885 984</a></li>
            </ul>
        </section>
        <hr>
        <section class="message">
            <h2>Send us a message</h2>
            <form action="mailto:abdulrahmanlyman7@gmail.com" method="post" enctype="text/plain">
                <label for="name">Name</label><br>
                <input type="text" id="name" name="name" required><br><br>

                <label for="email">Email</label><br>
                <input type="email" id="email" name="email" required><br><br>

                <label for="phone">Phone</label><br>
                <input type="tel" id="phone" name="phone" placeholder="+1 (234) 567-890"><br><br>

                <label for="message">Message</label><br>
                <textarea id="message" name="message" rows="5" required></textarea><br><br>

                <button type="submit">Send</button>
            </form>
        </section>
    </main>
</body>
</html>
